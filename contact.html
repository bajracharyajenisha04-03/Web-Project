<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #e6eef7;
            font-family: Arial;
            text-align: center;
            margin: 0;
        }
		h1 {
            margin-top: 30px;
            color: #0a3d62;
        }

       .contact-box, .form-box {
            background: white;
            width: 30%;
            margin: 20px auto;
            padding: 30px;
            border-radius: 10px;
        }

        .contact-box p {
            font-size: 18px;
            margin: 10px;
        }
		
        .form-box {
            text-align: left;
        }

        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%!important;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            height: 120px;
        }
        button {
            width: 100%;
            background-color: #0a3d62;
            color: white;
            padding: 12px;
            border: none;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background-color: #145a86;
        }
    </style>

</head>

<body>
<div class="navbar">
    <div class="logo">Elegance Wear</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="aboutus.html">About</a>
        <a href="collect.html">Collections</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

<h1>Get In Touch With Us</h1>
<p class="subtitle">We’re here to help you with your fashion needs</p>

<div class="contact-box">
    <p><strong>Email:</strong> elegancewear@gmail.com</p>
    <p><strong>Phone:</strong> +977 9801234565</p>
</div>

<div class="form-box">
    <form>

        <label>Your Name</label>
        <input type="text" placeholder="Enter your full name">

        <label>Email Address</label>
        <input type="email" placeholder="your@email.com">

        <label>Product Interest</label>
        <input type="text" placeholder="e.g. T-Shirts, Hoodies, Jeans">

        <label>Message</label>
        <textarea placeholder="Type your message..."></textarea>

        <button type="submit">Send Message</button>

    </form>
</div>
<footer class="text"> &copy; 2026 Elegance Wear. All rights reserved. </footer>
<footer class="text"> Created by:Jenisha Bajracharya 812</footer>
</body>
</html>
